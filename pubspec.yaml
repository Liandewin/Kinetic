name: kinetic
description: A Strava-like running & workout tracker app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Backend
  supabase_flutter: ^2.5.0

  # Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.3

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

  # Icons
  cupertino_icons: ^1.0.6

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
